services:
  valkey:
    image: valkey/valkey:8-alpine@sha256:a038175878d66b9d274fbf8be73c0305e93798b83917647f167e18cef3c71eec
    command: ["valkey-server", "--appendonly", "no"]
    ports:
      - "127.0.0.1:${SLIZEN_VALKEY_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 30

  slizend:
    image: ${SLIZEN_IMAGE:-slizen:dev}
    build:
      context: .
      args:
        VERSION: ${SLIZEN_VERSION:-dev}
        COMMIT: ${SLIZEN_COMMIT:-unknown}
    environment:
      SLIZEN_MODE: cache
      SLIZEN_PROXY_LISTEN: 0.0.0.0:6380
      SLIZEN_UPSTREAM_ADDRESS: valkey:6379
      SLIZEN_ADMIN_LISTEN: 0.0.0.0:9090
      SLIZEN_KEY_HASH_SECRET: demo-secret
      SLIZEN_LOG_LEVEL: info
    ports:
      - "127.0.0.1:${SLIZEN_PROXY_PORT:-6380}:6380"
      - "127.0.0.1:${SLIZEN_ADMIN_PORT:-9090}:9090"
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/slizenctl", "readyz", "--admin", "http://127.0.0.1:9090"]
      interval: 2s
      timeout: 2s
      retries: 30
