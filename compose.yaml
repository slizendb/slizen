services:
  valkey:
    image: valkey/valkey:8-alpine
    command: ["valkey-server", "--appendonly", "no"]
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 2s
      timeout: 1s
      retries: 30

  slizend:
    build: .
    environment:
      SLIZEN_MODE: cache
      SLIZEN_PROXY_LISTEN: 0.0.0.0:6380
      SLIZEN_UPSTREAM_ADDRESS: valkey:6379
      SLIZEN_ADMIN_LISTEN: 0.0.0.0:9090
      SLIZEN_KEY_HASH_SECRET: demo-secret
      SLIZEN_LOG_LEVEL: info
    ports:
      - "127.0.0.1:6380:6380"
      - "127.0.0.1:9090:9090"
    depends_on:
      valkey:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/usr/local/bin/slizenctl", "readyz", "--admin", "http://127.0.0.1:9090"]
      interval: 2s
      timeout: 2s
      retries: 30
