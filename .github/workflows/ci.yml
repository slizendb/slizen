name: ci

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:8-alpine@sha256:a038175878d66b9d274fbf8be73c0305e93798b83917647f167e18cef3c71eec
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 2s
          --health-timeout 1s
          --health-retries 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Download modules
        run: go mod download
      - name: Check
        run: |
          make check
          git diff --exit-code

  release-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.18.4
      - name: Download modules
        run: go mod download
      - name: Release check
        run: make release-check
      - name: Upload release workload evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: slizen-release-workload-result
          path: tmp/slizen-workload-result.json
          if-no-files-found: ignore

  vulnerability-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Download modules
        run: go mod download
      - name: govulncheck
        run: make vulncheck

  kubernetes-packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.18.4
      - name: Validate Kubernetes manifests and Helm chart
        run: make validate-k8s

  integration:
    runs-on: ubuntu-latest
    services:
      valkey:
        image: valkey/valkey:8-alpine@sha256:a038175878d66b9d274fbf8be73c0305e93798b83917647f167e18cef3c71eec
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 2s
          --health-timeout 1s
          --health-retries 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Download modules
        run: go mod download
      - name: Real Valkey integration tests
        timeout-minutes: 5
        run: |
          go build -o /tmp/slizend ./cmd/slizend
          SLIZEN_INTEGRATION=1 \
          SLIZEN_INTEGRATION_ORIGIN=127.0.0.1:6379 \
          SLIZEN_INTEGRATION_SLIZEND=/tmp/slizend \
            go test ./... -count=1 -timeout 3m
      - name: Benchmark against Valkey service
        timeout-minutes: 5
        run: |
          SLIZEN_UPSTREAM_ADDRESS=127.0.0.1:6379 \
          SLIZEN_PROXY_LISTEN=127.0.0.1:6380 \
          SLIZEN_ADMIN_LISTEN=127.0.0.1:9090 \
          SLIZEN_MODE=cache \
          SLIZEN_LOG_LEVEL=warn \
            /tmp/slizend --config ./slizen.example.toml > /tmp/slizend.log 2>&1 &
          slizend_pid=$!
          trap 'kill "${slizend_pid}" 2>/dev/null || true; wait "${slizend_pid}" 2>/dev/null || true; cat /tmp/slizend.log' EXIT

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:9090/readyz >/dev/null; then
              break
            fi
            sleep 1
          done
          curl -fsS http://127.0.0.1:9090/readyz

          go run ./cmd/slizenctl benchmark hotkey \
            --proxy 127.0.0.1:6380 \
            --origin 127.0.0.1:6379 \
            --admin http://127.0.0.1:9090 \
            --key product:iphone_17 \
            --warmup 3s \
            --duration 3s \
            --concurrency 8 \
            --requests 5000 \
            --output json \
            --json-file /tmp/slizen-benchmark-result.json
          jq -e '
            .name == "Slizen Hot Key Benchmark"
            and (.runtime_versions.slizen | type == "string" and length > 0 and ascii_downcase != "unknown")
            and (.runtime_versions.origin | type == "string" and length > 0 and ascii_downcase != "unknown")
            and ((.phases | map(.name)) == ["origin direct", "slizen cold", "slizen hot"])
          ' /tmp/slizen-benchmark-result.json >/dev/null

          go run ./cmd/slizenctl benchmark workload \
            --proxy 127.0.0.1:6380 \
            --origin 127.0.0.1:6379 \
            --admin http://127.0.0.1:9090 \
            --scenario all \
            --key-prefix product:slizen:ci:integration \
            --keys 100 \
            --value-size 128 \
            --read-ratio 95 \
            --concurrency 8 \
            --duration 5s \
            --requests 200000 \
            --seed 42 \
            --flash-every 40000 \
            --output json \
            --json-file /tmp/slizen-workload-result.json
          jq -e --arg key_prefix "product:slizen:ci:integration" '
            def known_version:
              type == "string" and length > 0 and ascii_downcase != "unknown";
            .name == "Slizen Release Workload Benchmark"
            and .scenario_selection == "all"
            and .key_prefix == $key_prefix
            and (.isolated_key_prefix | type == "string" and startswith($key_prefix + ":run-") and length > ($key_prefix | length))
            and (.runtime_versions.slizen | known_version)
            and (.runtime_versions.origin | known_version)
            and (.scenarios | type == "array" and length == 4)
            and ((.scenarios | map(.name) | sort) == ["moving-flash", "skew-80-20", "skew-99-1", "uniform"])
            and all(.scenarios[];
              .evidence_valid == true
              and .origin.value_mismatches == 0
              and .slizen.value_mismatches == 0
              and .origin.validation_failures == 0
              and .slizen.validation_failures == 0
              and .origin.validation_mismatches == 0
              and .slizen.validation_mismatches == 0
              and (.slizen.cache_hits | type == "number")
              and (.slizen.cache_misses | type == "number")
              and (.slizen.cache_misses_policy_bypass | type == "number")
              and (.slizen.cache_misses_not_admitted | type == "number")
              and (.slizen.cache_misses_not_present | type == "number")
              and (.slizen.cache_misses_policy_bypass
                + .slizen.cache_misses_not_admitted
                + .slizen.cache_misses_not_present == .slizen.cache_misses)
              and (.cache_hit_ratio_percent | type == "number")
              and (.origin_get_reduction_percent | type == "number")
            )
            and any(.scenarios[];
              .name == "skew-99-1"
              and .proved_origin_get_reduction == true
              and .slizen.cache_hits > 0
              and .cache_hit_ratio_percent > 0
              and .origin_get_reduction_percent > 0
            )
          ' /tmp/slizen-workload-result.json >/dev/null
      - name: Upload benchmark artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: slizen-benchmark-result
          path: |
            /tmp/slizen-benchmark-result.json
            /tmp/slizen-workload-result.json
          if-no-files-found: ignore
      - name: Docker Compose smoke and report
        run: |
          SLIZEN_VALKEY_PORT=16379 \
          SLIZEN_PROXY_PORT=16380 \
          SLIZEN_ADMIN_PORT=19090 \
          ADMIN_URL=http://127.0.0.1:19090 \
            make smoke

          SLIZEN_VALKEY_PORT=16379 \
          SLIZEN_PROXY_PORT=16380 \
          SLIZEN_ADMIN_PORT=19090 \
          ADMIN_URL=http://127.0.0.1:19090 \
          PROXY_ADDR=127.0.0.1:16380 \
          ORIGIN_ADDR=127.0.0.1:16379 \
          BENCHMARK_WARMUP=3s \
          BENCHMARK_DURATION=3s \
          BENCHMARK_CONCURRENCY=8 \
          BENCHMARK_REQUESTS=5000 \
            make demo-report
      - name: Upload demo report artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: slizen-demo-report
          path: |
            tmp/slizen-benchmark-result.json
            tmp/status-before.json
            tmp/status-after.json
            tmp/hotkeys.json
            tmp/audit.json
            tmp/demo-report.md
          if-no-files-found: ignore
