name: release-image

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  validate:
    if: github.repository == 'slizendb/slizen'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.18.4
      - name: Resolve release identity
        id: release
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "unsupported release tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
      - name: Download modules
        run: go mod download
      - name: Validate tagged source
        env:
          SLIZEN_VERSION: ${{ steps.release.outputs.version }}
          SLIZEN_COMMIT: ${{ github.sha }}
        run: make release-check
      - name: Upload tagged-source workload evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: slizen-${{ steps.release.outputs.version }}-tagged-source-evidence
          path: tmp/slizen-workload-result.json
          if-no-files-found: ignore

  publish:
    if: github.repository == 'slizendb/slizen'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1
        with:
          version: v3.18.4
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Sign in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Container metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/slizendb/slizen
          flavor: latest=false
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
          labels: |
            org.opencontainers.image.source=https://github.com/slizendb/slizen
            org.opencontainers.image.documentation=https://github.com/slizendb/slizen#readme
            org.opencontainers.image.licenses=Apache-2.0
      - name: Build and publish multi-architecture image
        id: push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.validate.outputs.version }}
            COMMIT=${{ github.sha }}
          provenance: mode=max
          sbom: true
      - name: Attest published image
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-name: ghcr.io/slizendb/slizen
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
      - name: Generate immutable deployment artifacts and image evidence
        env:
          SLIZEN_IMAGE: ghcr.io/slizendb/slizen@${{ steps.push.outputs.digest }}
          SLIZEN_VERSION: ${{ needs.validate.outputs.version }}
          SLIZEN_COMMIT: ${{ github.sha }}
        run: ./scripts/release_evidence.sh
      - name: Attest release Helm chart
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: tmp/slizen-${{ needs.validate.outputs.version }}.tgz
      - name: Attest release raw sidecar manifest
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661 # v3
        with:
          subject-path: tmp/slizen-observe-sidecar-${{ needs.validate.outputs.version }}.yaml
      - name: Upload immutable-image evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: slizen-${{ needs.validate.outputs.version }}-release-evidence
          path: |
            tmp/SHA256SUMS
            tmp/audit.json
            tmp/demo-report.md
            tmp/hotkeys.json
            tmp/release-evidence-manifest.json
            tmp/slizen-${{ needs.validate.outputs.version }}.tgz
            tmp/slizen-observe-sidecar-${{ needs.validate.outputs.version }}.yaml
            tmp/slizen-benchmark-result.json
            tmp/slizen-workload-result.json
            tmp/status-after.json
            tmp/status-before.json
          if-no-files-found: error
      - name: Promote verified stable aliases
        if: success()
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.validate.outputs.version }}
          RELEASE_DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          if [[ ! "${RELEASE_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease ${RELEASE_VERSION}: stable aliases are not promoted"
            exit 0
          fi
          major="${RELEASE_VERSION%%.*}"
          remainder="${RELEASE_VERSION#*.}"
          minor="${remainder%%.*}"
          docker buildx imagetools create \
            --tag "ghcr.io/slizendb/slizen:${major}.${minor}" \
            --tag "ghcr.io/slizendb/slizen:latest" \
            "ghcr.io/slizendb/slizen@${RELEASE_DIGEST}"
