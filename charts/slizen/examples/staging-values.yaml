# Copy this file and replace the namespace, Pod labels, and upstream address
# with values verified in the target staging cluster.
mode: observe

upstream:
  # v0.2 uses plaintext RESP to origin. Do not point this at a TLS-only service.
  address: redis.default.svc.cluster.local:6379

admin:
  # Metrics shares the complete admin listener; expose it only with the
  # restricted NetworkPolicy peer below.
  listen: 0.0.0.0:9090
  allowNetworkAccess: true

metrics:
  enabled: true
  serviceMonitor:
    # Set false only when another reviewed continuous scraper owns this Service.
    enabled: true

networkPolicy:
  enabled: true
  redisIngressPeers:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: app-staging
      podSelector:
        matchLabels:
          app.kubernetes.io/name: catalog-api
  metricsIngressPeers:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: monitoring
      podSelector:
        matchLabels:
          app.kubernetes.io/name: prometheus
