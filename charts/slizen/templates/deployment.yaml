{{- if hasKey .Values.podAnnotations "checksum/config" }}
{{- fail "podAnnotations must not override the chart-owned checksum/config annotation" }}
{{- end }}
{{- if or (hasKey .Values.podLabels "app.kubernetes.io/name") (hasKey .Values.podLabels "app.kubernetes.io/instance") }}
{{- fail "podLabels must not override chart-owned app.kubernetes.io/name or app.kubernetes.io/instance selector labels" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "slizen.fullname" . }}
  labels:
    {{- include "slizen.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  minReadySeconds: 5
  strategy:
    # v0.2 is single-node. Recreate prevents two independent cache states from
    # receiving traffic during an upgrade.
    type: Recreate
  selector:
    matchLabels:
      {{- include "slizen.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "slizen.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: slizen
          image: {{ include "slizen.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --config
            - /etc/slizen/slizen.toml
          {{- if or .Values.upstream.existingSecret.name .Values.privacy.existingSecret.name }}
          env:
            {{- with .Values.upstream.existingSecret.name }}
            - name: SLIZEN_UPSTREAM_USERNAME
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: {{ $.Values.upstream.existingSecret.usernameKey | quote }}
            - name: SLIZEN_UPSTREAM_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: {{ $.Values.upstream.existingSecret.passwordKey | quote }}
            {{- end }}
            {{- with .Values.privacy.existingSecret.name }}
            - name: SLIZEN_KEY_HASH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ . | quote }}
                  key: {{ $.Values.privacy.existingSecret.key | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: redis
              containerPort: 6380
              protocol: TCP
            {{- if .Values.metrics.enabled }}
            - name: admin
              containerPort: 9090
              protocol: TCP
            {{- end }}
          startupProbe:
            exec:
              command:
                - /usr/local/bin/slizenctl
                - healthz
                - --admin
                - http://127.0.0.1:9090
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds }}
          readinessProbe:
            exec:
              command:
                - /usr/local/bin/slizenctl
                - readyz
                - --admin
                - http://127.0.0.1:9090
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
          livenessProbe:
            exec:
              command:
                - /usr/local/bin/slizenctl
                - healthz
                - --admin
                - http://127.0.0.1:9090
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/slizen/slizen.toml
              subPath: slizen.toml
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "slizen.fullname" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
