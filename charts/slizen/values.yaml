replicaCount: 1

image:
  repository: ghcr.io/slizendb/slizen
  pullPolicy: IfNotPresent
  # Main may describe an unreleased candidate. Keep the runnable default pinned
  # to the latest verified public v0.2 image until a newer digest is published.
  tag: "0.2.2"
  digest: "sha256:7989b6ff17659b3f1b2f1d3feec8af6422b48f1f5486eb77247a5c82ba86b627"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Observe forwards every request and records telemetry without storing or
# serving local values. Promote selected prefixes to cache only after review.
mode: observe

upstream:
  # Plaintext RESP only in v0.2. Keep this path private or use an external,
  # separately reviewed local tunnel; TLS-required origins are not supported.
  address: redis.default.svc.cluster.local:6379
  database: 0
  dialTimeout: 2s
  readTimeout: 2s
  writeTimeout: 2s
  # The chart never creates or renders Redis credentials. When name is set,
  # both keys are required so an auth typo fails closed; use an empty username
  # value for Redis's default user.
  existingSecret:
    name: ""
    usernameKey: username
    passwordKey: password

proxy:
  # Idle downstream connection deadline. Keep it above the application's
  # expected pool-idle/reuse interval to avoid reconnect churn.
  readTimeout: 5m
  writeTimeout: 3s
  shutdownTimeout: 10s
  maxCommandBytes: 1048576
  maxCommandArgs: 1024
  maxMGetKeys: 512
  maxConnections: 1024

admin:
  listen: 127.0.0.1:9090
  # Required acknowledgement before metrics can expose the admin listener to
  # the Pod network. Leave false to keep the default loopback-only posture.
  allowNetworkAccess: false

cache:
  maxBytes: 67108864
  maxEntries: 100000
  maxLocalTTL: 30s
  allowStaleOnUpstreamError: false
  staleGrace: 0s
  # Reserved for a later release; the schema requires 0s.
  negativeTTL: 0s
  # Longest literal prefix wins. Cache rules require maxItemBytes and
  # maxLocalTTL; deny/observe rules omit both limits.
  # The empty-prefix observe rule keeps unmatched keys out of the cache if the
  # global mode is later changed to cache for selective promotion.
  policies:
    - prefix: ""
      mode: observe
  # - prefix: "catalog:"
  #   mode: cache
  #   maxItemBytes: 1048576
  #   maxLocalTTL: 10s

hotness:
  window: 1s
  ewmaAlpha: 0.5
  promotionThreshold: 100
  demotionThreshold: 20
  minimumHotWindows: 2
  cooldown: 30s
  maxTrackedKeys: 100000

privacy:
  keyVisibility: hash
  # Optional stable HMAC key. Without it, Slizen generates a random
  # process-local secret and key IDs change after restart. The chart does not
  # create this Secret.
  existingSecret:
    name: ""
    key: key-hash-secret

logging:
  level: info
  format: json

service:
  type: ClusterIP
  port: 6380
  annotations: {}

# Slizen v0.2 does not authenticate downstream RESP clients. The default
# NetworkPolicy therefore selects the Slizen Pod and denies all ingress until
# the operator explicitly lists the application and monitoring peers.
networkPolicy:
  enabled: true
  redisIngressPeers: []
  metricsIngressPeers: []

# `checksum/config` is chart-owned and rejected here.
podAnnotations: {}
# `app.kubernetes.io/name` and `app.kubernetes.io/instance` are chart-owned
# selector labels and are rejected here.
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsNonRoot: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: "1"
    memory: 256Mi

probes:
  startup:
    failureThreshold: 30
    periodSeconds: 2
    timeoutSeconds: 2
  readiness:
    failureThreshold: 3
    periodSeconds: 5
    timeoutSeconds: 2
  liveness:
    failureThreshold: 3
    periodSeconds: 10
    timeoutSeconds: 2

# The chart rejects values that are not strictly above proxy.shutdownTimeout,
# so Kubernetes leaves time for Slizen to finish its bounded connection drain.
terminationGracePeriodSeconds: 30

metrics:
  # Enabling metrics requires admin.listen=0.0.0.0:9090 and an explicit
  # admin.allowNetworkAccess=true acknowledgement. The resulting ClusterIP can
  # reach the complete admin API, so list only the monitoring identities under
  # networkPolicy.metricsIngressPeers.
  enabled: false
  service:
    port: 9090
    annotations: {}
  serviceMonitor:
    enabled: false
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

nodeSelector: {}
tolerations: []
affinity: {}
